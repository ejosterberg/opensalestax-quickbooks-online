name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, openssl, sodium
          coverage: xdebug
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPCS (PSR-12)
        run: vendor/bin/phpcs

      - name: Composer audit
        run: composer audit --no-dev || true

      - name: Upload coverage
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify DCO sign-off on all commits since base
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            # On push events, just check the last commit
            base="HEAD~1"
          fi
          missing=$(git log --no-merges --format='%H %s%n%b%n---END---' "${base}..HEAD" \
            | awk 'BEGIN{RS="---END---\n"} !/Signed-off-by:/{print $1}' \
            | grep -v '^$' || true)
          if [ -n "$missing" ]; then
            echo "::error::Commits missing Signed-off-by trailer:"
            echo "$missing"
            exit 1
          fi
          echo "All commits have DCO sign-off."
